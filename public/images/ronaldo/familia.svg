<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="80%">
      <stop offset="0%" stop-color="#f0e4d0"/>
      <stop offset="100%" stop-color="#d4c0a2"/>
    </radialGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a5a34" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4a3018" stop-opacity="0.22"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#vignette)"/>
  <!-- figura adulto esquerdo (maior) -->
  <ellipse cx="430" cy="295" rx="72" ry="80" fill="#a87f54" opacity="0.65"/>
  <path d="M300 800 Q310 535 372 512 Q400 500 430 497 Q460 500 488 512 Q550 535 560 800Z" fill="#a87f54" opacity="0.65"/>
  <!-- figura adulto direito (menor) -->
  <ellipse cx="770" cy="300" rx="68" ry="76" fill="#8c6840" opacity="0.6"/>
  <path d="M640 800 Q650 538 712 515 Q740 502 770 499 Q800 502 828 515 Q890 538 900 800Z" fill="#8c6840" opacity="0.6"/>
  <!-- criança centro-frente -->
  <ellipse cx="600" cy="390" rx="44" ry="50" fill="#c4965a" opacity="0.7"/>
  <path d="M536 800 Q540 598 562 582 Q580 572 600 569 Q620 572 638 582 Q660 598 664 800Z" fill="#c4965a" opacity="0.7"/>
  <!-- linha sutil no chão -->
  <line x1="240" y1="770" x2="960" y2="770" stroke="#8a6440" stroke-opacity="0.14" stroke-width="1"/>
  <text x="600" y="52" text-anchor="middle" fill="#6b4e2e" font-size="12" font-family="Georgia, serif" letter-spacing="6" opacity="0.65">FAMÍLIA</text>
  <text x="600" y="748" text-anchor="middle" fill="#8a6440" font-size="10" font-family="Arial, sans-serif" letter-spacing="4" opacity="0.42">VÍNCULOS — substituir por foto real</text>
</svg>
