<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2e1e12"/>
      <stop offset="100%" stop-color="#0d0806"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="figure" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2614"/>
      <stop offset="100%" stop-color="#1a0f08"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <!-- silhueta corpo -->
  <ellipse cx="600" cy="310" rx="96" ry="108" fill="url(#figure)"/>
  <path d="M420 780 Q430 540 500 510 Q540 495 600 490 Q660 495 700 510 Q770 540 780 780Z" fill="url(#figure)"/>
  <!-- colarinho/terno -->
  <path d="M560 490 L600 530 L640 490 Q620 505 600 505 Q580 505 560 490Z" fill="#C9A96E" opacity="0.5"/>
  <!-- linha dourada decorativa -->
  <line x1="440" y1="760" x2="760" y2="760" stroke="#C9A96E" stroke-opacity="0.25" stroke-width="1"/>
  <!-- label -->
  <text x="600" y="58" text-anchor="middle" fill="#C9A96E" font-size="13" font-family="Georgia, serif" letter-spacing="6" opacity="0.9">RONALDO CANTARELLI</text>
  <text x="600" y="84" text-anchor="middle" fill="#E8D9C3" font-size="11" font-family="Arial, sans-serif" letter-spacing="3" opacity="0.5">PSICANALISTA · TERAPEUTA</text>
  <text x="600" y="746" text-anchor="middle" fill="#C9A96E" font-size="11" font-family="Arial, sans-serif" letter-spacing="4" opacity="0.55">RETRATO PRINCIPAL — substituir por foto real</text>
</svg>
